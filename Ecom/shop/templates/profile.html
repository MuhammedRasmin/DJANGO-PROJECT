{% extends 'base.html' %}
{% block content %}

<h2>Your Profile 👤</h2>

<p><b>Username:</b> {{ user.username }}</p>
<p><b>Email:</b> {{ user.email }}</p>
<p><b>Phone:</b> {{ profile.phone }}</p>
<p><b>Address:</b> {{ profile.address }}</p>

<a href="{% url 'update_profile' %}" class="btn btn-dark mt-2">
    Edit Profile
</a>

{% endblock %}
